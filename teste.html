<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Seleção com Opções Dinâmicas</title>
    <style>
        /* Estilo básico para inputs adicionais ocultos */
        .extra-inputs {
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h3>Selecione uma Opção:</h3>
    <label for="locationSelect">Escolha uma opção de localização:</label>
    <select id="locationSelect">
        <option value="suaLocalizacao">Sua Localização</option>
        <option value="colocarLocalizacao">Colocar Localização</option>
    </select>

    <!-- Inputs adicionais para "Colocar Localização" -->
    <div id="extraInputs" class="extra-inputs">
        <h4>Digite sua localização:</h4>
        <label for="latitude">Latitude:</label>
        <input type="text" id="latitude" name="latitude" placeholder="Insira a latitude">
        <br>
        <label for="longitude">Longitude:</label>
        <input type="text" id="longitude" name="longitude" placeholder="Insira a longitude">
    </div>

    <script>
        // Obtenção dos elementos
        const locationSelect = document.getElementById('locationSelect');
        const extraInputs = document.getElementById('extraInputs');

        // Evento para monitorar mudanças no select
        locationSelect.addEventListener('change', function() {
            // Verifica o valor selecionado e exibe ou oculta os inputs adicionais
            if (locationSelect.value === 'colocarLocalizacao') {
                extraInputs.style.display = 'block';
            } else {
                extraInputs.style.display = 'none';
            }
        });
    </script>
</body>
</html>
