<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <link rel="shortcut icon" href="https://github.com/HerickHannier/ConsertaCidade/blob/main/logo%20consertacidade.png?raw=true" type="image/x-icon">
    <title>ConsertaCidade</title> 
    <meta name="Login">
</head>
<body>
    <div class="form">
        <form action="#" class="sub-form">
            <div class="upper-fomr">
                <br>
                <h2>Cadastro</h2>
                <label>Nome completo</label><br>
                <Input type="text" name="nome" id="nome"></Input><br>
                <label>Email</label><br>
                <Input type="text" name="email" id="email"></Input><br>
                <label>Senha</label><br>
                <Input type="password" name="password" id="senha"></Input><br>
                <label>Confirmação de senha</label><br>
                <Input type="password" name="password" id="confisenha"></Input><br>
                <div class="btn">
                    <button id="emailButton">Entrar</button>
                </div>
            </div>
            <div class="bottom-form">
                <div class="no-account">Ja possui uma conta?</div>
                <a href="index.html" class="signup">Login</a>
            </div>
        </form>
    </div>
    <script src="cadastro.js"></script>
</body>
</html>
